<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Main outer background gradient (Deep magical void) -->
    <linearGradient id="bgGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F1118"/>
      <stop offset="50%" stop-color="#07090C"/>
      <stop offset="100%" stop-color="#020305"/>
    </linearGradient>

    <!-- Rich gold metallic gradient -->
    <linearGradient id="goldGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF3C4" />
      <stop offset="30%" stop-color="#FBBF24" />
      <stop offset="70%" stop-color="#D97706" />
      <stop offset="100%" stop-color="#78350F" />
    </linearGradient>

    <!-- Electric Amber/Fire aura gradient -->
    <radialGradient id="auroraGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.25"/>
      <stop offset="70%" stop-color="#EF4444" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- Inner crest shield gradient -->
    <linearGradient id="shieldBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>

    <!-- Magical blade glow -->
    <linearGradient id="bladeGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="35%" stop-color="#F59E0B" />
      <stop offset="50%" stop-color="#FFFBEB" />
      <stop offset="65%" stop-color="#FBBF24" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
  </defs>

  <!-- 1. Deep Outer Square Base with Premium Rounded Corners -->
  <rect width="512" height="512" rx="120" fill="url(#bgGradient)"/>

  <!-- Subtle grid lines to give depth / high-tech RPG feel -->
  <g stroke="#ffffff" stroke-opacity="0.02" stroke-width="1">
    <line x1="64" y1="0" x2="64" y2="512" />
    <line x1="128" y1="0" x2="128" y2="512" />
    <line x1="192" y1="0" x2="192" y2="512" />
    <line x1="256" y1="0" x2="256" y2="512" />
    <line x1="320" y1="0" x2="320" y2="512" />
    <line x1="384" y1="0" x2="384" y2="512" />
    <line x1="448" y1="0" x2="448" y2="512" />
    <line x1="0" y1="64" x2="512" y2="64" />
    <line x1="0" y1="128" x2="512" y2="128" />
    <line x1="0" y1="192" x2="512" y2="192" />
    <line x1="0" y1="256" x2="512" y2="256" />
    <line x1="0" y1="320" x2="512" y2="320" />
    <line x1="0" y1="384" x2="512" y2="384" />
    <line x1="0" y1="448" x2="512" y2="448" />
  </g>

  <!-- Outer Ambient Glow Circular Backdrop -->
  <circle cx="256" cy="256" r="220" fill="url(#auroraGlow)"/>

  <!-- 2. Gold Border Frame -->
  <rect x="24" y="24" width="464" height="464" rx="100" fill="none" stroke="url(#goldGradient)" stroke-width="8" opacity="0.85"/>
  <rect x="36" y="36" width="440" height="440" rx="90" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.1"/>

  <!-- Symmetrical corner elements for medieval frame design -->
  <path d="M 24,80 L 80,24 M 432,24 L 488,80 M 488,432 L 432,488 M 80,488 L 24,432" stroke="url(#goldGradient)" stroke-width="6" opacity="0.8" stroke-linecap="round"/>

  <!-- 3. Runic/Glow Ring -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="url(#goldGradient)" stroke-width="3" stroke-dasharray="10 25 40 15" opacity="0.4" transform="rotate(45 256 256)"/>
  <circle cx="256" cy="256" r="142" fill="none" stroke="#FBBF24" stroke-width="1.5" stroke-dasharray="4 8" opacity="0.5"/>

  <!-- 4. Majestic Central Knight/RPG Crest Shield -->
  <g drop-shadow="0px 15px 30px rgba(0,0,0,0.7)">
    <!-- Base Shield -->
    <path d="M 256,75 
             C 345,75 390,110 390,195 
             C 390,320 256,415 256,415 
             C 256,415 122,320 122,195 
             C 122,110 167,75 256,75 Z" 
          fill="url(#shieldBg)" 
          stroke="url(#goldGradient)" 
          stroke-width="10" 
          stroke-linejoin="round"/>
    
    <!-- Shield Inner Rim Detail -->
    <path d="M 256,90 
             C 333,90 372,120 372,195 
             C 372,300 256,388 256,388 
             C 256,388 140,300 140,195 
             C 140,120 179,90 256,90 Z" 
          fill="none" 
          stroke="#FFFFFF" 
          stroke-width="1.5" 
          opacity="0.15"/>
  </g>

  <!-- 5. Wings flanking the sword representing Quests, Ascent and Glory -->
  <g opacity="0.85" stroke="url(#goldGradient)" stroke-linejoin="round">
    <!-- Left Wing -->
    <path d="M210,180 C170,140 150,190 155,230 C160,260 190,280 215,280 C195,260 185,230 210,210 Z" fill="url(#goldGradient)" fill-opacity="0.2" stroke-width="3"/>
    <path d="M220,200 C190,170 175,205 180,235 C185,255 205,270 220,270 Z" fill="url(#goldGradient)" fill-opacity="0.4" stroke-width="1.5"/>
    
    <!-- Right Wing -->
    <path d="M302,180 C342,140 362,190 357,230 C352,260 322,280 297,280 C317,260 327,230 302,210 Z" fill="url(#goldGradient)" fill-opacity="0.2" stroke-width="3"/>
    <path d="M292,200 C322,170 337,205 332,235 C327,255 307,270 292,270 Z" fill="url(#goldGradient)" fill-opacity="0.4" stroke-width="1.5"/>
  </g>

  <!-- Star Embellishments -->
  <g fill="#FFF">
    <circle cx="256" cy="115" r="4" opacity="0.9" />
    <path d="M 256,105 L 258,113 L 266,115 L 258,117 L 256,125 L 254,117 L 246,115 L 254,113 Z" fill="#FFF" opacity="0.75" />
    <circle cx="180" cy="310" r="3" opacity="0.6" />
    <circle cx="332" cy="310" r="3" opacity="0.6" />
  </g>

  <!-- 6. Legendary Glowing Sword (Quest & Combat) -->
  <g transform="translate(0, 5)">
    <!-- Aura Blade Glow (Back) -->
    <path d="M 256,105 L 273,260 L 256,275 L 239,260 Z" 
          fill="#F59E0B" 
          opacity="0.4" 
          filter="blur(5px)"/>

    <!-- Actual Blade -->
    <path d="M 256,115 L 270,260 L 256,272 L 242,260 Z" 
          fill="url(#bladeGlow)" 
          stroke="url(#goldGradient)" 
          stroke-width="2"/>

    <!-- Central Blade Groove (Fuller) -->
    <line x1="256" y1="130" x2="256" y2="255" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
    <line x1="256" y1="130" x2="256" y2="255" stroke="#FBBF24" stroke-width="4" stroke-linecap="round" opacity="0.4" filter="blur(2px)"/>

    <!-- Guard (Crossguard) with elegant wing shape and gem in center -->
    <path d="M 205,268 
             C 215,264 240,274 256,274 
             C 272,274 297,264 307,268 
             C 310,276 295,286 256,286 
             C 217,286 202,276 205,268 Z" 
          fill="url(#goldGradient)" 
          stroke="#451A03" 
          stroke-width="1.5"/>

    <path d="M 225,270 L 256,278 L 287,270 L 256,272 Z" fill="#FFFBEB" opacity="0.5" />

    <!-- Red glowing gem in the center of the crossguard -->
    <circle cx="256" cy="277" r="4" fill="#EF4444" stroke="#FFF" stroke-width="1" />
    <circle cx="256" cy="277" r="8" fill="#EF4444" opacity="0.4" filter="blur(2px)"/>

    <!-- Leather-wrapped Grip/Hilt -->
    <rect x="249" y="286" width="14" height="48" rx="3" fill="#451A03" stroke="url(#goldGradient)" stroke-width="1.5"/>
    <!-- Wrap Details -->
    <line x1="249" y1="296" x2="263" y2="300" stroke="url(#goldGradient)" stroke-width="1.5" opacity="0.7" />
    <line x1="249" y1="308" x2="263" y2="312" stroke="url(#goldGradient)" stroke-width="1.5" opacity="0.7" />
    <line x1="249" y1="320" x2="263" y2="324" stroke="url(#goldGradient)" stroke-width="1.5" opacity="0.7" />

    <!-- Pommel with beautiful teardrop emerald gem -->
    <path d="M 247,334 M 256,334 L 264,342 L 256,350 L 248,342 Z" fill="url(#goldGradient)" stroke="#451A03" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- Glowing Core in Pommel -->
    <circle cx="256" cy="342" r="3.5" fill="#10B981" />
    <circle cx="256" cy="342" r="6" fill="#10B981" opacity="0.6" filter="blur(1px)"/>
  </g>
</svg>
